<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workshop Check-In</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <style>
        .fullpage-success {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--success, #28a745);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease-in-out;
            text-align: center;
            padding: 20px;
        }
        .fullpage-success.show {
            opacity: 1;
            pointer-events: auto;
        }
        .fullpage-success h1 {
            font-size: 3.5rem;
            margin: 0;
            margin-bottom: 20px;
            color: #ffffff;
            font-family: inherit;
        }
        .fullpage-success h2 {
            font-size: 2rem;
            margin: 0;
            color: #e0f8e9;
            font-family: inherit;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            border-radius: 8px;
            border: 1px solid #ccc;
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="fullpage-success" id="success-overlay">
        <h1 id="success-name"></h1>
        <h2>Successfully Attended</h2>
    </div>

    <main>
        <div class="card" id="main-card">
            <div style="text-align: center; margin-bottom: 30px;">
                <h1 style="color: var(--text-primary);">Check In</h1>
                <p class="subtitle" style="font-size: 1.1rem; color: var(--text-secondary);">Enter your Phone Number</p>
            </div>
            
            <form id="checkin-form">
                <div class="input-group">
                    <input type="text" id="unique_code" name="unique_code" placeholder="e.g. 9876543210" maxlength="15" pattern="[A-Za-z0-9\+\-\s]+" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" required autofocus>
                </div>
                <button type="submit" class="btn-primary" id="submit-btn" style="width: 100%; padding: 18px; font-size: 1.2rem; border-radius: 8px; cursor: pointer; border: none; font-weight: 600;">Check In</button>
            </form>
            
            <div id="feedback" class="feedback-box"></div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('checkin-form');
            const input = document.getElementById('unique_code');
            const feedback = document.getElementById('feedback');
            const card = document.getElementById('main-card');
            const successOverlay = document.getElementById('success-overlay');
            const successName = document.getElementById('success-name');
            const csrfToken = document.querySelector('meta[name="csrf-token"]').getAttribute('content');

            const triggerHaptic = (type) => {
                if ('vibrate' in navigator) {
                    if (type === 'success') navigator.vibrate([50, 50, 50]); 
                    else if (type === 'error') navigator.vibrate([50, 100, 50]); 
                }
            };

            const showFeedback = (message, type, name = '') => {
                feedback.textContent = message;
                feedback.className = `feedback-box feedback-${type} show`;
                
                card.classList.remove('shake', 'pop');
                void card.offsetWidth; 
                
                if (type === 'error' || type === 'warning') {
                    card.classList.add('shake');
                    triggerHaptic('error');
                    input.focus();
                    input.select();
                } else if (type === 'success') {
                    card.classList.add('pop');
                    triggerHaptic('success');
                    
                    successName.textContent = name || message;
                    successOverlay.classList.add('show');

                    setTimeout(() => {
                         successOverlay.classList.remove('show');
                         input.value = '';
                         input.focus();
                         feedback.classList.remove('show');
                    }, 3500);
                }
            };

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const code = input.value.trim();
                
                if (!code) {
                    showFeedback('Please enter your phone number', 'error');
                    return;
                }

                input.disabled = true;
                
                try {
                    const response = await fetch('/checkin', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                            'X-CSRFToken': csrfToken
                        },
                        body: `unique_code=${encodeURIComponent(code)}`
                    });
                    
                    const data = await response.json();
                    showFeedback(data.message, data.type, data.name);
                    
                } catch (err) {
                    showFeedback('Connection Error. Try again.', 'error');
                } finally {
                    input.disabled = false;
                    if(feedback.classList.contains('feedback-error') || feedback.classList.contains('feedback-warning')) {
                         input.focus();
                    }
                }
            });
        });
    </script>
</body>
</html>
