<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Setup</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .form-group input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .radio-group label {
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
    </style>
</head>

<body style="background-color: #f5f5f7;">
    <main>
        <div class="card" style="max-width: 500px;">
            <div style="text-align: center; margin-bottom: 20px;">
                <h1>Setup Workshop</h1>
                <p class="subtitle">Import Participant Data</p>
            </div>

            <div class="flash-messages">
                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                {% for category, message in messages %}
                <div class="flash-message flash-{{ category }}">{{ message }}</div>
                {% endfor %}
                {% endif %}
                {% endwith %}
            </div>

            <form action="{{ url_for('admin_import') }}" method="post" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="form-group">
                    <label>Workshop Name</label>
                    <input type="text" name="workshop_name" placeholder="e.g. NextGen AI Summit" required>
                </div>

                <div class="form-group">
                    <label>Import Action</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="action" value="create_new" checked>
                            Create New (Clears previous data)
                        </label>
                        <label>
                            <input type="radio" name="action" value="add_existing">
                            Add to Existing
                        </label>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 30px;">
                    <label>Upload Excel File (.xlsx)</label>
                    <div class="file-upload-wrapper">
                        <input type="file" name="file" id="file" accept=".xlsx" required style="width: 100%;">
                        <p style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 8px;">Requires columns:
                            Name, Phone</p>
                    </div>
                </div>

                <button type="submit" class="btn-primary"
                    style="width: 100%; padding: 15px; font-size: 1.1rem; border-radius: 8px; border: none; font-weight: 600; cursor: pointer;">Import
                    & Save</button>
            </form>

            <div style="margin-top: 20px; text-align: center;">
                <a href="{{ url_for('main_portal') }}"
                    style="color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500; margin-right: 15px;">Back
                    to Portal</a>
                <a href="{{ url_for('admin_dashboard') }}"
                    style="color: var(--blue-primary); text-decoration: none; font-size: 14px; font-weight: 500;">Skip
                    to Dashboard</a>
            </div>
        </div>
    </main>
</body>

</html>
