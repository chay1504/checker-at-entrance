<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Workshop Check-In</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <style>
        .login-card {
            max-width: 400px;
            margin: 50px auto;
            padding: 40px 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .login-card input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .login-card button {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            background: #007aff;
            color: white;
            font-weight: 600;
        }
    </style>
</head>

<body
    style="background-color: #f5f5f7; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0;">
    <div class="login-card">
        <h1 style="color: #333; margin-bottom: 30px; font-size: 1.8rem;">Admin Login</h1>

        {% with messages = get_flashed_messages(category_filter=["error"]) %}
        {% if messages %}
        {% for message in messages %}
        <div style="color: #dc3545; margin-bottom: 15px; font-weight: 500;">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
            <input type="text" name="username" placeholder="Username" required autofocus>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>
    </div>
</body>

</html>
